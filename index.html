<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Pathfinding</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Cargando Python...</div>
</div>

<header>
    <h1>A<span>*</span> Pathfinding</h1>
</header>

<main class="layout">
    <aside class="sidebar">
        <div class="card">
            <div class="card-title">Herramientas</div>
            <button class="tool-btn active-start" id="btn-start" onclick="setTool('start')">Inicio</button>
            <button class="tool-btn" id="btn-end" onclick="setTool('end')">Destino</button>
            <button class="tool-btn" id="btn-wall" onclick="setTool('wall')">Muro</button>
            <button class="tool-btn" id="btn-erase" onclick="setTool('erase')">Borrador</button>
        </div>

        <div class="card">
            <div class="card-title">Acciones</div>
            <button class="run-btn" onclick="window._runAstar()">▶ Ejecutar</button>
            <button class="clear-btn" onclick="window._resetAll()">Reiniciar Mapa</button>
        </div>

        <div class="card">
            <div class="card-title">Estadísticas</div>
            <div class="stat-row"><span>Costo:</span> <span id="s-cost" class="val">—</span></div>
            <div class="stat-row"><span>Tiempo:</span> <span id="s-time" class="val">—</span></div>
        </div>
        
        <div id="status-box" class="status-box s-idle">Listo para dibujar</div>
    </aside>

    <section class="grid-area">
        <div id="grid-container"></div>
        <p class="hint">Clic y arrastra para crear muros</p>
    </section>
</main>

<script type="py" src="./main.py" config="./pyscript.json"></script>

<script>
    // Configuración de la Grid
    const ROWS = 10, COLS = 10;
    let currentTool = 'start';
    let isDown = false;

    const container = document.getElementById('grid-container');
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `c_${r}_${c}`;
            cell.addEventListener('mousedown', (e) => { 
                isDown = true; 
                if(window._applyTool) window._applyTool(r, c);
                e.preventDefault();
            });
            cell.addEventListener('mouseenter', () => { 
                if(isDown && window._applyTool) window._applyTool(r, c);
            });
            container.appendChild(cell);
        }
    }
    document.addEventListener('mouseup', () => isDown = false);

    // Helpers de UI
    window.setTool = (t) => {
        currentTool = t;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-start', 'active-end', 'active-wall', 'active-erase'));
        document.getElementById('btn-' + t).classList.add('active-' + t);
    };
    window._getTool = () => currentTool;
    window._setStatus = (type, msg) => {
        const el = document.getElementById('status-box');
        el.className = `status-box s-${type}`;
        el.textContent = msg;
    };
    window._setStats = (cost, time) => {
        document.getElementById('s-cost').textContent = cost;
        document.getElementById('s-time').textContent = time;
    };
</script>
</body>
</html>
